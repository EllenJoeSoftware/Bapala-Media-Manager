<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Bapala — Player</title>
  <link rel="stylesheet" href="/css/app.css">
</head>
<body>
<nav>
  <a class="logo" href="/index.html">Bapala</a>
  <a href="/index.html">← Library</a>
  <div class="spacer"></div>
</nav>
<div class="player-wrap">
  <div class="video-container">
    <video id="vid" controls preload="metadata"></video>
    <!-- Resume banner — shown when a saved position exists -->
    <div class="resume-banner" id="resumeBanner" style="display:none" role="dialog" aria-label="Resume playback">
      <div class="resume-inner">
        <span class="resume-icon">⏱</span>
        <span>Resume from <strong id="resumeTime"></strong>?</span>
        <button class="btn resume-yes" id="resumeYes">Resume</button>
        <button class="filter-btn resume-no" id="resumeNo">Start Over</button>
      </div>
    </div>
  </div>
  <div class="player-meta">
    <h1 id="title">Loading…</h1>
    <div class="sub" id="meta"></div>
    <p id="desc"></p>
  </div>
</div>
<script src="/js/api.js"></script>
<script src="/js/player.js"></script>
</body>
</html>
